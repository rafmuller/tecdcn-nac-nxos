nxos:
  devices:
    - name: leaf01
      url: https://10.15.37.73
      device_groups:
        - LEAFS
        - VMWARE_DVS_STACK1
        - VPC
      variables:
        vpc_domain_id: 11
        vpc_local_ip: 10.15.37.73
        vpc_peer_ip: 10.15.37.74
        vpc_port_channel_id: 1
      configuration:
        system:
          hostname: leaf01
          mtu: 9216
        feature:
          bfd: true
          bgp: true
          evpn: true
          fabric_forwarding: true
          nv_overlay: true
          interface_vlan: true
          ospf: true
          pim: true
          udld: true
          vpc: true
        routing:
          ospf_processes:
            - name: "1"
              router_id: 10.0.0.21
              areas:
                - id: 0.0.0.0
          pim:
            anycast_rp_local_interface_type: loopback
            anycast_rp_local_interface_id: "250"
            anycast_rp_source_interface_type: loopback
            anycast_rp_source_interface_id: "250"
            rps:
              - address: 10.250.250.1
              - address: 10.250.250.2
        interfaces:
          loopbacks:
            - id: 0
              description: "Routing Loopback interface"
              ip:
                address: 10.0.0.21/32
              interface_groups:
                - LEAF_LOOPBACK_INTERFACES
            - id: 1
              description: "VTEP Loopback interface"
              ip:
                address: 10.100.100.1/32
                secondary_addresses:
                  - address: 10.100.101.11/32
              interface_groups:
                - LEAF_LOOPBACK_INTERFACES
          ethernets:
            - id: 1/1
              interface_groups:
                - VMWARE_DVS_STACK1_INTERFACES
            - id: 1/2
              interface_groups:
                - VMWARE_DVS_STACK1_INTERFACES
            - id: 1/3
              interface_groups:
                - VMWARE_DVS_STACK1_INTERFACES
            # - id: 1/46
            #   interface_groups:
            #     - VPC_PEER_INTERACE
            - id: 1/47
              interface_groups:
                - LEAF_FABRIC_INTERFACES
            - id: 1/48
              interface_groups:
                - LEAF_FABRIC_INTERFACES
