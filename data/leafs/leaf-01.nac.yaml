nxos:
  devices:
    - name: leaf01
      url: https://10.15.37.73
      device_groups:
        - LEAFS
        - VMWARE_DVS_STACK1
        - VPC
      variables:
        vpc_domain_id: 11
        vpc_local_ip: 10.15.37.73
        vpc_peer_ip: 10.15.37.74
        vpc_port_channel_id: 1
      configuration:
        system:
          hostname: leaf01
          mtu: 9216
        fabric_forwarding:
          anycast_gateway_mac: 20:20:00:00:10:12
        routing:
          ospf_processes:
            - name: "1"
              router_id: 10.0.0.21
              areas:
                - id: 0.0.0.0
          pim:
            anycast_rp_local_interface_type: loopback
            anycast_rp_local_interface_id: "250"
            anycast_rp_source_interface_type: loopback
            anycast_rp_source_interface_id: "250"
            rps:
              - address: 10.250.250.1
              - address: 10.250.250.2
        vrfs:
          - name: VRF_DVS1
            description: VRF for DVS1
            vni: 51000
            l3vni: true
            route_distinguisher: auto
            address_families:
              - address_family: ipv4-unicast
                route_target_both_auto: true
                route_target_both_auto_evpn: true
              - address_family: ipv6-unicast
                route_target_both_auto: true
                route_target_both_auto_evpn: true
        vlan:
          vlans:
            - id: 10
              name: DVS_VLAN1
              vni: 20010
            - id: 20
              name: DVS_VLAN2
              vni: 20020
        interfaces:
          loopbacks:
            - id: 0
              description: "Routing Loopback interface"
              ip:
                address: 10.0.0.21/32
              interface_groups:
                - LEAF_LOOPBACK_INTERFACES
            - id: 1
              description: "VTEP Loopback interface"
              ip:
                address: 10.100.100.1/32
                secondary_addresses:
                  - address: 10.100.101.11/32
              interface_groups:
                - LEAF_LOOPBACK_INTERFACES
          nve:
            vnis:
              - vni: 20010
                mcast_group: 239.1.1.1
              - vni: 20020
                mcast_group: 239.1.1.1
          vlans:
            - id: 10
              vrf: VRF_DVS1
              ip:
                address: 192.168.86.1/24
              fabric_forwarding_mode: anycast-gw
            - id: 20
              vrf: VRF_DVS1
              ip:
                address: 192.168.87.1/24
              fabric_forwarding_mode: anycast-gw
          port_channels:
            - id: 10
              mtu: 9216
              vpc_id: 11
              switchport:
                mode: trunk
                trunk_allowed_vlans:
                  ids: 
                    - 10
                    - 20
          ethernets:
            - id: 1/1
              channel_group: 10
              channel_group_mode: active
              interface_groups:
                - VMWARE_DVS_STACK1_INTERFACES
            - id: 1/2
              interface_groups:
                - VMWARE_DVS_STACK1_INTERFACES
            - id: 1/3
              interface_groups:
                - VMWARE_DVS_STACK1_INTERFACES
            - id: 1/47
              interface_groups:
                - LEAF_FABRIC_INTERFACES
            - id: 1/48
              interface_groups:
                - LEAF_FABRIC_INTERFACES
