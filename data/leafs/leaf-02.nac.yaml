nxos:
  devices:
    - name: leaf02
      url: https://10.15.37.74
      device_groups:
        - LEAFS
        - VPC
      variables:
        vpc_domain_id: 901
        vpc_local_ip: 10.15.37.74
        vpc_peer_ip: 10.15.37.73
        vpc_port_channel_id: 1
        routing_loopback_ip: 10.0.0.22
        router_id: 10.0.0.22
      configuration:
        system:
          hostname: leaf02
          mtu: 9216
        fabric_forwarding:
          anycast_gateway_mac: 20:20:00:00:10:12
        routing:
          ospf_processes:
            - name: "1"
              router_id: 10.0.0.22
              areas:
                - id: 0.0.0.0
          pim:
            # anycast_rp_local_interface_type: loopback
            # anycast_rp_local_interface_id: "250"
            # anycast_rp_source_interface_type: loopback
            # anycast_rp_source_interface_id: "250"
            rps:
              - address: 10.250.250.1
              - address: 10.250.250.2
          bgp:
            vrfs:
              - vrf: VRF_DVS1
                enforce_first_as: true
                address_families:
                  - address_family: ipv4-unicast
                    advertise_l2vpn_evpn: true
                    client_to_client_reflection: true
                    maximum_paths: 2
                    redistributions:
                      - protocol: direct
                        route_map: fabric-rmap-redist-subnet
                  - address_family: ipv6-unicast
                    advertise_l2vpn_evpn: true
                    client_to_client_reflection: true
                    maximum_paths: 2
                    redistributions:
                      - protocol: direct
                        route_map: fabric-rmap-redist-subnet
        vrfs:
          - name: VRF_DVS1
            description: VRF for DVS1
            vni: 51000
            route_distinguisher: auto
            address_families:
              - address_family: ipv4-unicast
                route_target_both_auto: true
                route_target_both_auto_evpn: true
              - address_family: ipv6-unicast
                route_target_both_auto: true
                route_target_both_auto_evpn: true
        vlan:
          vlans:
            - id: 10
              name: DVS_VLAN1
              vn_segment: 20010
            - id: 20
              name: DVS_VLAN2
              vn_segment: 20020
            - id: 2001
              name: VRF_DVS1_VLAN1
              vn_segment: 51000
        evpn:
          vnis:
            - vni: 20010
              rd: auto
              route_target_both_auto: true
            - vni: 20020
              rd: auto
              route_target_both_auto: true
        interfaces:
          loopbacks:
            - id: 0
              description: "Routing Loopback interface"
              ip:
                address: 10.0.0.22/32
              interface_groups:
                - LEAF_LOOPBACK_INTERFACES
            - id: 1
              description: "VTEP Loopback interface"
              ip:
                address: 10.100.100.2/32
                secondary_addresses:
                  - address: 10.100.101.11/32
              interface_groups:
                - LEAF_LOOPBACK_INTERFACES
          nve:
            vnis:
              - vni: 20010
                mcast_group: 239.1.1.1
              - vni: 20020
                mcast_group: 239.1.1.1
              - vni: 51000
                associate_vrf: true
          vlans:
            - id: 10
              vrf: VRF_DVS1
              ip:
                address: 192.168.86.1/24
                tag: 12345
                redirects: false
              fabric_forwarding_mode: anycast-gw
            - id: 20
              vrf: VRF_DVS1
              ip:
                address: 192.168.87.1/24
                tag: 12345
                redirects: false
              fabric_forwarding_mode: anycast-gw
            - id: 2001
              mtu: 9216
              vrf: VRF_DVS1
              ip:
                forward: true
                redirects: false
              ipv6:
                redirects: false
                address_use_link_local_only: true
          port_channels:
            - id: 10
              mtu: 9216
              vpc_id: 10
              switchport:
                mode: trunk
                trunk_allowed_vlans:
                  ranges:
                    - from: 1
                      to: 4094
              spanning_tree:
                port_type: edge
                bpduguard: true
          ethernets:
            - id: 1/1
              channel_group: 10
              channel_group_mode: active
              mtu: 9216
              switchport:
                enabled: true
                mode: trunk
                trunk_allowed_vlans:
                  ranges:
                    - from: 1
                      to: 4094
              spanning_tree:
                port_type: edge
                bpduguard: true
            - id: 1/47
              interface_groups:
                - LEAF_FABRIC_INTERFACES
            - id: 1/48
              interface_groups:
                - LEAF_FABRIC_INTERFACES
