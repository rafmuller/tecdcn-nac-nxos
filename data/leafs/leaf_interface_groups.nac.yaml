nxos:
  interface_groups:
    - name: LEAF_LOOPBACK_INTERFACES
      configuration:
        ospf:
          process: "1"
          area: 0.0.0.0
          advertise_secondaries: true
        pim:
          sparse_mode: true
    
    - name: LEAF_FABRIC_INTERFACES
      configuration:
        description: "Leaf fabric interface"
        mtu: 9216
        switchport:
          enabled: false
        medium: p2p
        ip:
          unnumbered: lo0
        ospf:
          process: "1"
          area: 0.0.0.0
          network: point-to-point
        pim:
          sparse_mode: true


    - name: VMWARE_DVS_STACK1_INTERFACES
      configuration:
        description: "VMware DVS Stack 1 trunk interface"
        mtu: 9216
        switchport:
          enabled: true
          mode: trunk
          trunk_allowed_vlans:
            ranges:
              - from: 1
                to: 4094
        spanning_tree:
          port_type: edge
          bpduguard: true
