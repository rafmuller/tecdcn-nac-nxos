nxos:
  interface_groups:
    - name: SPINE_LOOPBACK_INTERFACES
      configuration:
        ospf:
          process: "1"
          area: 0.0.0.0
          network: p2p
        pim:
          sparse_mode: true
    
    - name: SPINE_FABRIC_INTERFACES
      configuration:
        switchport:
          enabled: false
        medium: p2p
        ip:
          unnumbered: lo0
        ospf:
          process: "1"
          area: 0.0.0.0
          network: p2p
        pim:
          sparse_mode: true